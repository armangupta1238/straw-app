<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#6d28d9"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Straw"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <link rel="apple-touch-startup-image" href="/splash-1290x2796.png" media="(device-width: 645px) and (device-height: 1398px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash-1179x2556.png" media="(device-width: 589px) and (device-height: 1278px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash-1170x2532.png" media="(device-width: 585px) and (device-height: 1266px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash-1125x2436.png" media="(device-width: 562px) and (device-height: 1218px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash-828x1792.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <title>Straw Collector — Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:       #6d28d9;
      --purple-mid:   #a78bfa;
      --purple-pale:  #ede9fe;
      --purple-dark:  #2d1b69;
      --dark:         #1e1b3a;
      --amber:        #f59e0b;
      --cream:        #faf9fb;
      --muted:        #a89070;
      --teal:         #0d9488;
      --red:          #dc2626;
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      display: flex;
      align-items: stretch;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    .left {
      flex: 1;
      background: var(--dark);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 56px 52px;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(109,40,217,0.3) 0%, transparent 70%);
      top: -100px; left: -120px;
      z-index: 0; pointer-events: none;
    }

    .field-art {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 240px;
      z-index: 0; overflow: hidden;
    }

    .stalk {
      position: absolute; bottom: 0;
      width: 3px; border-radius: 4px 4px 0 0;
      background: linear-gradient(to top, #3b1f6b, var(--purple) 60%, var(--purple-mid) 100%);
      transform-origin: bottom center;
      animation: sway 4s ease-in-out infinite;
      opacity: 0.6;
    }
    .stalk::after {
      content: '🌾';
      position: absolute; top: -28px; left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      filter: hue-rotate(200deg) saturate(0.8) brightness(1.1);
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-2deg); }
      50%       { transform: rotate(2deg); }
    }

    .left-top { position: relative; z-index: 1; }
    .left-bottom { position: relative; z-index: 1; padding-bottom: 250px; }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(167,139,250,0.12);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 100px; padding: 6px 16px;
      font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--purple-mid);
      margin-bottom: 28px;
    }
    .badge span { font-size: 14px; }

    .left h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(42px, 5vw, 64px);
      font-weight: 800; color: var(--cream);
      line-height: 1.05; letter-spacing: -1px;
    }
    .left h1 em { font-style: normal; color: var(--purple-mid); }

    .stats { display: flex; gap: 32px; }
    .stat-item { display: flex; flex-direction: column; gap: 4px; }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; color: var(--amber); }
    .stat-label { font-size: 11px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: rgba(250,249,251,0.35); }

    /* ── RIGHT PANEL ── */
    .right {
      width: 480px; flex-shrink: 0;
      background: var(--cream);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 56px 52px;
      position: relative; overflow-y: auto;
    }

    .right::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 4px; height: 100%;
      background: linear-gradient(to bottom, transparent, var(--purple-mid), transparent);
      opacity: 0.5;
    }

    .home-wrap {
      width: 100%; max-width: 340px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── TOP ROW: logo + logout ── */
    .top-row {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .logo-row { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 44px; height: 44px;
      background: var(--purple); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .logo-text { display: flex; flex-direction: column; }
    .logo-name { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: var(--dark); line-height: 1.1; }
    .logo-sub { font-size: 10px; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--muted); }

    .logout-btn {
      display: flex; align-items: center; gap: 6px;
      background: #fef2f2; border: 1.5px solid #fecaca;
      color: var(--red); border-radius: 10px;
      padding: 8px 14px; font-size: 13px; font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: background 0.2s, border-color 0.2s, transform 0.1s;
      text-decoration: none;
    }
    .logout-btn:hover { background: var(--red); color: #fff; border-color: var(--red); }
    .logout-btn:active { transform: scale(0.97); }
    .logout-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── GREETING ── */
    .greeting-block { margin-bottom: 28px; }
    .role-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 100px;
      font-size: 11px; font-weight: 600; letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 10px;
    }
    .role-pill.promoter { background: var(--purple-pale); color: var(--purple); }
    .role-pill.agent    { background: #fef3c7; color: #92400e; }
    .role-pill.admin    { background: #ecfdf5; color: #065f46; }

    .home-title {
      font-family: 'Syne', sans-serif;
      font-size: 26px; font-weight: 700;
      color: var(--dark); margin-bottom: 4px;
    }
    .home-sub { font-size: 14px; font-weight: 300; color: var(--muted); }

    /* ── CHOICE BUTTONS ── */
    .choices { display: flex; flex-direction: column; gap: 10px; }

    .choice-btn {
      display: flex; align-items: center; gap: 16px;
      width: 100%; padding: 18px 20px;
      background: #fff; border: 2px solid #e5e7eb; border-radius: 14px;
      cursor: pointer; text-align: left;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
      text-decoration: none;
      animation: fadeUp 0.5s ease both;
    }
    .choice-btn:nth-child(1) { animation-delay: 0.05s; }
    .choice-btn:nth-child(2) { animation-delay: 0.12s; }
    .choice-btn:nth-child(3) { animation-delay: 0.19s; }

    .choice-btn:hover {
      border-color: var(--purple);
      box-shadow: 0 4px 16px rgba(109,40,217,0.12);
      transform: translateY(-1px);
    }
    .choice-icon {
      font-size: 26px; width: 48px; height: 48px;
      background: var(--purple-pale); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .choice-text { flex: 1; }
    .choice-label { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--dark); }
    .choice-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .choice-arrow { font-size: 18px; color: var(--purple-mid); }

    .footer-note {
      margin-top: 28px; font-size: 12px; font-weight: 400;
      color: #bbb0a0; text-align: center; line-height: 1.6;
    }

    /* ── LOADING STATE ── */
    .loading-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 200px; gap: 12px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--purple-pale);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--muted); }

    /* ── MOBILE ── */
    @media (max-width: 820px) {
      html, body { height: auto; overflow: auto; }
      body { flex-direction: column; overflow-y: auto; overflow-x: hidden; }

      /* dark hero — compact, no paddy */
      .left {
        flex: none; width: 100%;
        padding: 44px 28px 36px;
        justify-content: flex-start;
        overflow: hidden; min-height: auto;
      }
      .glow { width: 260px; height: 260px; top: -60px; left: -60px; opacity: 0.5; }
      .badge { margin-bottom: 16px; font-size: 10px; padding: 5px 14px; }
      .left h1 { font-size: 40px; line-height: 1.05; letter-spacing: -1.5px; }
      .stats { display: none; }
      .field-art { display: none; }
      .left-bottom { display: none; }

      /* home content pulled up tight */
      .right {
        width: 100%; flex-shrink: 0;
        padding: 28px 24px 48px;
        justify-content: flex-start;
        overflow-y: visible; min-height: auto;
      }
      .right::before { display: none; }
      .home-wrap { max-width: 100%; }
      .top-row { margin-bottom: 24px; }
      .greeting-block { margin-bottom: 20px; }
      .home-title { font-size: 22px; }
      .choice-btn { padding: 14px 16px; }
      .choice-icon { width: 42px; height: 42px; font-size: 22px; }
      .footer-note { margin-top: 20px; }
    }
  </style>
</head>
<body>

  <!-- LEFT PANEL -->
  <div class="left">
    <div class="glow"></div>
    <div class="field-art" id="fieldArt"></div>
    <div class="left-top">
      <div class="badge"><span>🌾</span> Straw Collector Portal</div>
      <h1>Harvest.<br/><em>Track.</em><br/>Collect.</h1>
    </div>
    <div class="left-bottom">
      <div class="stats">
        <div class="stat-item"><span class="stat-num">240+</span><span class="stat-label">Farmers</span></div>
        <div class="stat-item"><span class="stat-num">18</span><span class="stat-label">Active Agents</span></div>
        <div class="stat-item"><span class="stat-num">5 T</span><span class="stat-label">Collected</span></div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <div class="home-wrap" id="homeWrap">
      <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <div class="loading-text">Loading your workspace…</div>
      </div>
    </div>
  </div>

  <script>
    const THIRTY_DAYS = 30 * 24 * 60 * 60 * 1000;

    // Generate wheat stalks — desktop only
    const isMobile = window.innerWidth <= 820;
    if (!isMobile) {
    const art = document.getElementById('fieldArt');
    for (let i = 0; i < 22; i++) {
      const s = document.createElement('div');
      s.className = 'stalk';
      const h = 120 + Math.random() * 100;
      s.style.cssText = `
        left: ${2 + i * 4.5 + Math.random() * 3}%;
        height: ${h}px;
        animation-delay: ${Math.random() * 4}s;
        animation-duration: ${3 + Math.random() * 3}s;
        opacity: ${0.3 + Math.random() * 0.4};
      `;
      art.appendChild(s);
    }
    } // end desktop-only

    function logout() {
      localStorage.removeItem('agent');
      window.location.href = 'login.html';
    }

    function renderHome(agent) {
      const role = agent.role;       // admin / promoter / agent
      const name = agent.full_name || 'there';

      const isPromoterOrAdmin = role === 'admin' || role === 'promoter';

      // Role pill label + class
      const roleLabel = role === 'admin' ? '⚙️ Admin' : role === 'promoter' ? '📋 Promoter' : '🌾 Agent';
      const roleClass = role === 'admin' ? 'admin' : role === 'promoter' ? 'promoter' : 'agent';

      // Build choice buttons
      const dashboardBtn = isPromoterOrAdmin ? `
        <a href="dashboard.html" class="choice-btn">
          <div class="choice-icon">📊</div>
          <div class="choice-text">
            <div class="choice-label">Dashboard</div>
            <div class="choice-desc">View stats, farmers, agents and pickups</div>
          </div>
          <span class="choice-arrow">→</span>
        </a>` : '';

      const html = `
        <div class="top-row">
          <div class="logo-row">
            <div class="logo-icon">🌾</div>
            <div class="logo-text">
              <span class="logo-name">Straw Collector</span>
              <span class="logo-sub">Operations Portal</span>
            </div>
          </div>
          <button class="logout-btn" onclick="logout()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            Logout
          </button>
        </div>

        <div class="greeting-block">
          <div class="role-pill ${roleClass}">${roleLabel}</div>
          <div class="home-title">Hey, ${name.split(' ')[0]}! 👋</div>
          <div class="home-sub">Where would you like to go?</div>
        </div>

        <div class="choices">
          ${dashboardBtn}
          <a href="farmer-form.html" class="choice-btn">
            <div class="choice-icon">👨‍🌾</div>
            <div class="choice-text">
              <div class="choice-label">Add Farmer</div>
              <div class="choice-desc">Register a new farmer in the field</div>
            </div>
            <span class="choice-arrow">→</span>
          </a>
          <a href="pickup-form.html" class="choice-btn">
            <div class="choice-icon">🚛</div>
            <div class="choice-text">
              <div class="choice-label">Record Pickup</div>
              <div class="choice-desc">Log straw collection from a farmer</div>
            </div>
            <span class="choice-arrow">→</span>
          </a>
        </div>

        <div class="footer-note">Straw Collector © 2025 · Authorized personnel only</div>
      `;

      document.getElementById('homeWrap').innerHTML = html;
    }

    // Check session
    try {
      const saved = localStorage.getItem('agent');
      if (saved) {
        const agent = JSON.parse(saved);
        if (Date.now() - (agent.loginTime || 0) < THIRTY_DAYS) {
          renderHome(agent);
        } else {
          localStorage.removeItem('agent');
          window.location.href = 'login.html';
        }
      } else {
        window.location.href = 'login.html';
      }
    } catch(e) {
      window.location.href = 'login.html';
    }
  </script>


  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
