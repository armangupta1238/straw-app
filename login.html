.card { background:var(--card); border-radius:24px; padding:32px 28px; width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.3); animation:fadeUp .5s ease .1s both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

.card-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; color:var(--dark); margin-bottom:4px; }
.card-sub   { font-size:13px; color:var(--muted); margin-bottom:24px; }

.field { margin-bottom:16px; }
.field label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin-bottom:6px; }
.field input { width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--dark); background:#fff; outline:none; transition:border-color .2s,box-shadow .2s; }

.btn-login { width:100%; padding:16px; border-radius:14px; border:none; background:var(--green); color:#fff; font-family:'Syne',sans-serif; font-size:16px; font-weight:700; cursor:pointer; margin-top:8px; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
.btn-login:hover  { background:#1f4f37; transform:translateY(-1px); }
.btn-login:active { transform:scale(.98); }
.btn-login:disabled { opacity:.6; cursor:not-allowed; transform:none; }

.error-msg { background:#fde8ea; border:1px solid #f5c2c7; border-radius:10px; padding:10px 14px; font-size:13px; color:#c0392b; margin-top:12px; display:none; text-align:center; }
.error-msg.show { display:block; }

.footer-text { text-align:center; margin-top:24px; font-size:12px; color:rgba(255,255,255,0.4); animation:fadeUp .5s ease .2s both; }

<script>
  const API = 'https://straw-app-production.up.railway.app/api';
  const THIRTY_DAYS = 30 * 24 * 60 * 60 * 1000;

  // Check if already logged in and session is still valid
  function checkAutoLogin() {
    try {
      const saved = localStorage.getItem('agent');
      if (!saved) return false;
      const agent = JSON.parse(saved);
      const loginTime = agent.loginTime || 0;
      if (Date.now() - loginTime < THIRTY_DAYS) {
        // Still valid — go straight to form
        window.location.href = 'farmer-form.html';
        return true;
      } else {
        // Expired — clear and show login
        localStorage.removeItem('agent');
        return false;
      }
    } catch(e) {
      return false;
    }
  }

  checkAutoLogin();

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn      = document.getElementById('loginBtn');
    const errMsg   = document.getElementById('errorMsg');

    if (!username || !password) {
      errMsg.textContent = '⚠️ Please enter both username and password.';
      errMsg.classList.add('show');
      return;
    }

    btn.textContent = '⏳ Signing in...';
    btn.disabled    = true;
    errMsg.classList.remove('show');

    try {
      const res  = await fetch(`${API}/auth/login`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success) {
        // Save with timestamp for 30-day auto-login
        data.loginTime = Date.now();
        localStorage.setItem('agent', JSON.stringify(data));
        window.location.href = 'farmer-form.html';
      } else {
        errMsg.textContent = '❌ Invalid username or password.';
        errMsg.classList.add('show');
        btn.textContent = 'Sign In →';
        btn.disabled    = false;
      }
    } catch(e) {
      errMsg.textContent = '❌ Cannot connect to server. Try again.';
      errMsg.classList.add('show');
      btn.textContent = 'Sign In →';
      btn.disabled    = false;
    }
  }
</script>

</body>
