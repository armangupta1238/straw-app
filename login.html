body {
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  background: #1a4731;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
}

/* Top logo area */
.top {
  text-align: center;
  margin-bottom: 28px;
}
.top .icon {
  font-size: 56px;
  display: block;
  margin-bottom: 10px;
}
.top h1 {
  font-family: 'Syne', sans-serif;
  font-size: 30px;
  font-weight: 800;
  color: #ffffff;
  letter-spacing: -0.5px;
}
.top p {
  font-size: 14px;
  color: rgba(255,255,255,0.55);
  margin-top: 4px;
}

/* White card */
.card {
  background: #ffffff;
  border-radius: 20px;
  padding: 36px 32px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 25px 80px rgba(0,0,0,0.4);
}

.card h2 {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: #1a1f16;
  margin-bottom: 6px;
}
.card p {
  font-size: 13px;
  color: #7a8270;
  margin-bottom: 28px;
}

/* Fields */
.field {
  margin-bottom: 18px;
}
.field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #2d6a4f;
  margin-bottom: 8px;
}
.field input {
  display: block;
  width: 100%;
  padding: 14px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: #1a1f16;
  background: #f4f8f5;
  border: 2px solid #d4e6da;
  border-radius: 12px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field input::placeholder {
  color: #b0bdb5;
}
.field input:focus {
  border-color: #52b788;
  box-shadow: 0 0 0 4px rgba(82,183,136,0.15);
  background: #ffffff;
}

/* Button */
.btn {
  display: block;
  width: 100%;
  padding: 16px;
  margin-top: 8px;
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #ffffff;
  background: #2d6a4f;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.btn:hover   { background: #1f4f39; }
.btn:active  { transform: scale(0.98); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* Error */
.error {
  display: none;
  margin-top: 14px;
  padding: 12px 16px;
  background: #fde8ea;
  border: 1px solid #f5c2c7;
  border-radius: 10px;
  font-size: 13px;
  color: #c0392b;
  text-align: center;
}
.error.show { display: block; }

/* Footer */
.footer {
  margin-top: 24px;
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  text-align: center;
}

<script>
  const API = 'https://straw-app-production.up.railway.app/api';
  const THIRTY_DAYS = 30 * 24 * 60 * 60 * 1000;

  // Auto-login check
  try {
    const saved = localStorage.getItem('agent');
    if (saved) {
      const agent = JSON.parse(saved);
      if (Date.now() - (agent.loginTime || 0) < THIRTY_DAYS) {
        window.location.href = 'farmer-form.html';
      } else {
        localStorage.removeItem('agent');
      }
    }
  } catch(e) {}

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn      = document.getElementById('loginBtn');
    const err      = document.getElementById('errorMsg');

    if (!username || !password) {
      err.textContent = '⚠️ Please enter username and password.';
      err.classList.add('show');
      return;
    }

    btn.textContent = '⏳ Signing in...';
    btn.disabled    = true;
    err.classList.remove('show');

    try {
      const res  = await fetch(`${API}/auth/login`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success) {
        data.loginTime = Date.now();
        localStorage.setItem('agent', JSON.stringify(data));
        window.location.href = 'farmer-form.html';
      } else {
        err.textContent = '❌ Invalid username or password.';
        err.classList.add('show');
        btn.textContent = 'Sign In →';
        btn.disabled    = false;
      }
    } catch(e) {
      err.textContent = '❌ Cannot connect to server. Try again.';
      err.classList.add('show');
      btn.textContent = 'Sign In →';
      btn.disabled    = false;
    }
  }
</script>
