<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Straw Collector — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:       #6d28d9;
      --purple-mid:   #a78bfa;
      --purple-pale:  #ede9fe;
      --purple-dark:  #2d1b69;
      --dark:         #1e1b3a;
      --amber:        #f59e0b;
      --cream:        #faf9fb;
      --muted:        #a89070;
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      display: flex;
      align-items: stretch;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    .left {
      flex: 1;
      background: var(--dark);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 56px 52px;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(109,40,217,0.3) 0%, transparent 70%);
      top: -100px;
      left: -120px;
      z-index: 0;
      pointer-events: none;
    }

    .field-art {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 240px;
      z-index: 0;
      overflow: hidden;
    }

    .stalk {
      position: absolute;
      bottom: 0;
      width: 3px;
      border-radius: 4px 4px 0 0;
      background: linear-gradient(to top, #3b1f6b, var(--purple) 60%, var(--purple-mid) 100%);
      transform-origin: bottom center;
      animation: sway 4s ease-in-out infinite;
      opacity: 0.6;
    }

    .stalk::after {
      content: '🌾';
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      filter: hue-rotate(200deg) saturate(0.8) brightness(1.1);
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-2deg); }
      50%       { transform: rotate(2deg); }
    }

    .left-top { position: relative; z-index: 1; }
    .left-bottom { position: relative; z-index: 1; padding-bottom: 250px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(167,139,250,0.12);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--purple-mid);
      margin-bottom: 28px;
    }

    .badge span { font-size: 14px; }

    .left h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(42px, 5vw, 64px);
      font-weight: 800;
      color: var(--cream);
      line-height: 1.05;
      letter-spacing: -1px;
      margin-bottom: 0;
    }

    .left h1 em { font-style: normal; color: var(--purple-mid); }

    .stats { display: flex; gap: 32px; }
    .stat-item { display: flex; flex-direction: column; gap: 4px; }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; color: var(--amber); }
    .stat-label { font-size: 11px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: rgba(250,249,251,0.35); }

    /* ── RIGHT PANEL ── */
    .right {
      width: 480px;
      flex-shrink: 0;
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 56px 52px;
      position: relative;
      overflow-y: auto;
    }

    .right::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, var(--purple-mid), transparent);
      opacity: 0.5;
    }

    .form-wrap {
      width: 100%;
      max-width: 340px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }

    .logo-icon {
      width: 44px; height: 44px;
      background: var(--purple);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .logo-text { display: flex; flex-direction: column; }
    .logo-name { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: var(--dark); line-height: 1.1; }
    .logo-sub { font-size: 10px; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--muted); }

    .form-title { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
    .form-sub { font-size: 14px; font-weight: 300; color: var(--muted); margin-bottom: 36px; }

    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--purple); margin-bottom: 8px; }

    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-wrap .field-icon {
      position: absolute; left: 16px;
      width: 16px; height: 16px;
      color: var(--muted); pointer-events: none;
      transition: color 0.2s;
      /* vertically centred by flex on parent */
    }
    .field input {
      width: 100%; padding: 14px 16px 14px 44px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 400;
      color: var(--dark); background: #ffffff;
      border: 1.5px solid #ddd5c4; border-radius: 12px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input::placeholder { color: #c4b89e; }
    .field input:focus { border-color: var(--purple); box-shadow: 0 0 0 4px rgba(109,40,217,0.1); }
    .input-wrap:focus-within .field-icon { color: var(--purple); }

    /* password field needs room for eye button */
    #password { padding-right: 52px; }

    /* ── EYE BUTTON — fixed centering ── */
    .toggle-pw {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: #eee8dc;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: var(--dark);
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .toggle-pw:hover { background: var(--purple); color: var(--cream); }
    .toggle-pw svg { display: block; }

    .btn {
      width: 100%; padding: 16px; margin-top: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
      color: var(--cream); background: var(--purple); border: none; border-radius: 12px;
      cursor: pointer; letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%); }
    .btn:hover { background: var(--purple-dark); box-shadow: 0 8px 24px rgba(109,40,217,0.35); }
    .btn:active { transform: scale(0.985); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .error {
      display: none; margin-top: 16px; padding: 12px 16px;
      background: #fdf0f0; border: 1px solid #f0c8c8;
      border-radius: 10px; font-size: 13px; color: #b03030; text-align: center;
    }
    .error.show { display: block; }

    .footer-note { margin-top: 24px; font-size: 12px; font-weight: 400; color: #bbb0a0; text-align: center; line-height: 1.6; }

    /* ── MOBILE ── */
    @media (max-width: 820px) {
      html, body { height: auto; overflow: auto; }
      body { flex-direction: column; overflow-y: auto; overflow-x: hidden; }

      .left {
        flex: none; width: 100%;
        padding: 44px 28px 36px;
        justify-content: flex-start;
        overflow: hidden; min-height: auto;
      }
      .glow { width: 260px; height: 260px; top: -60px; left: -60px; opacity: 0.5; }
      .badge { margin-bottom: 16px; font-size: 10px; padding: 5px 14px; }
      .left h1 { font-size: 40px; line-height: 1.05; letter-spacing: -1.5px; }
      .stats { display: none; }
      .field-art { display: none; }
      .left-bottom { display: none; }

      .right {
        width: 100%; flex-shrink: 0;
        padding: 28px 28px 48px;
        justify-content: flex-start;
        overflow-y: visible; min-height: auto;
      }
      .right::before { display: none; }
      .form-wrap { max-width: 100%; }
      .logo-row { margin-bottom: 20px; }
      .form-title { font-size: 26px; }
      .form-sub { margin-bottom: 24px; }
    }
  </style>
</head>
<body>

  <!-- LEFT PANEL -->
  <div class="left">
    <div class="glow"></div>

    <div class="left-top">
      <div class="badge"><span>🌾</span> Straw Collector Portal</div>
      <h1>Harvest.<br/><em>Track.</em><br/>Collect.</h1>
    </div>

    <div class="left-bottom">
      <div class="stats">
        <div class="stat-item"><span class="stat-num">240+</span><span class="stat-label">Farmers</span></div>
        <div class="stat-item"><span class="stat-num">18</span><span class="stat-label">Active Agents</span></div>
        <div class="stat-item"><span class="stat-num">5 T</span><span class="stat-label">Collected</span></div>
      </div>
      <!-- field art moved here on mobile so it sits at bottom of banner -->
      <div class="field-art" id="fieldArt"></div>
      <div class="mobile-badge" style="display:none"><span>🌾</span> Straw Collector Portal</div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <div class="form-wrap" id="loginForm">
      <div class="logo-row">
        <div class="logo-icon">🌾</div>
        <div class="logo-text">
          <span class="logo-name">Straw Collector</span>
          <span class="logo-sub">Operations Portal</span>
        </div>
      </div>

      <div class="form-title">Welcome back</div>
      <div class="form-sub">Sign in to continue</div>

      <div class="field">
        <label>Username</label>
        <div class="input-wrap">
          <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username"/>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" onkeydown="if(event.key==='Enter') login()"/>
          <button class="toggle-pw" type="button" id="togglePw" aria-label="Toggle password visibility">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn" id="loginBtn" onclick="login()">Sign In →</button>
      <div class="error" id="errorMsg"></div>

      <div class="footer-note">Straw Collector © 2025 · Authorized personnel only</div>
    </div>
  </div>

  <script>
    const API = 'https://straw-app-production.up.railway.app/api';
    const THIRTY_DAYS = 30 * 24 * 60 * 60 * 1000;

    // Show access denied message if redirected from dashboard
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error') === 'access_denied') {
      const err = document.getElementById('errorMsg');
      err.textContent = '🚫 You don\'t have permission to access that page.';
      err.classList.add('show');
    }

    // Auto-login — skip login form if session still valid, go straight to home
    try {
      const saved = localStorage.getItem('agent');
      if (saved) {
        const agent = JSON.parse(saved);
        if (Date.now() - (agent.loginTime || 0) < THIRTY_DAYS) {
          window.location.href = 'home.html';
        } else {
          localStorage.removeItem('agent');
        }
      }
    } catch(e) {}

    // Generate wheat stalks
    const art = document.getElementById('fieldArt');
    const isMobile = window.innerWidth <= 820;
    const stalkCount = isMobile ? 20 : 22;
    
    for (let i = 0; i < stalkCount; i++) {
      const s = document.createElement('div');
      s.className = 'stalk';
      const h = isMobile ? 90 + Math.random() * 20 : 120 + Math.random() * 100;
      s.style.cssText = `
        left: ${2 + i * (isMobile ? 5.5 : 4.5) + Math.random() * 2}%;
        height: ${h}px;
        animation-delay: ${Math.random() * 4}s;
        animation-duration: ${3 + Math.random() * 3}s;
        opacity: ${0.3 + Math.random() * 0.4};
      `;
      art.appendChild(s);
    }

    const pwInput  = document.getElementById('password');
    const togglePw = document.getElementById('togglePw');
    const EYE_ON  = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const EYE_OFF = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

    togglePw.addEventListener('click', () => {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      document.getElementById('eyeIcon').innerHTML = isText ? EYE_ON : EYE_OFF;
    });

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = pwInput.value.trim();
      const btn      = document.getElementById('loginBtn');
      const err      = document.getElementById('errorMsg');

      if (!username || !password) {
        err.textContent = '⚠️ Please enter your username and password.';
        err.classList.add('show');
        return;
      }

      btn.textContent = 'Signing in…';
      btn.disabled    = true;
      err.classList.remove('show');

      try {
        const res  = await fetch(`${API}/auth/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('agent', JSON.stringify({ ...data, loginTime: Date.now() }));
          btn.textContent = '✓ Signed in!';
          window.location.href = 'home.html';
        } else {
          err.textContent = '❌ Invalid username or password.';
          err.classList.add('show');
          btn.textContent = 'Sign In →';
          btn.disabled    = false;
        }
      } catch(e) {
        err.textContent = '❌ Cannot connect to server. Please try again.';
        err.classList.add('show');
        btn.textContent = 'Sign In →';
        btn.disabled    = false;
      }
    }
  </script>

</body>
</html>
